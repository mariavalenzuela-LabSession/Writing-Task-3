<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Assessment: Wedding Reply</title>
    <style>
        :root {
            --primary: #2980b9;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
            --text: #2c3e50;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 25px; }
        
        .student-selection {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .instruction-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .box { padding: 15px; border-radius: 10px; font-size: 0.85rem; line-height: 1.4; }
        .prompt-box { background: #f0f7ff; border: 1px solid #3498db; grid-column: span 2; color: #2980b9; }
        .writing-zone { position: relative; }
        textarea { height: 200px; resize: none; font-size: 1.1rem; }
        .word-counter { position: absolute; bottom: 15px; right: 15px; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; background: #eee; }
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-submit:disabled { background: #bdc3c7; }
        #feedbackArea { margin-top: 30px; display: none; padding: 25px; border-radius: 12px; background: #f9f9f9; border: 2px solid #eee; }
        .improve { color: #d35400; font-weight: 600; }
        .correct { color: var(--success); font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Email Task: Wedding Reply</h1>
        <p>Select your name and complete the task.</p>
    </header>

    <div id="blockMessage" style="display:none; color: var(--error); text-align: center; font-weight: bold; margin-bottom: 20px; padding: 15px; border: 1px solid var(--error); border-radius: 8px; background-color: #fdeaea;">
        ⚠️ Ya has enviado esta tarea.
    </div>

    <div class="student-selection">
        <select id="courseSelect" onchange="updateStudentList()">
            <option value="">Select Class</option>
            <option value="7A">7A</option>
            <option value="7B">7B</option>
            <option value="7C">7C</option>
        </select>
        <select id="studentSelect" disabled>
            <option value="">Select your name</option>
        </select>
    </div>

    <div class="instruction-grid">
        <div class="box prompt-box">
            <strong>📧 Message from Maxi:</strong><br>
            "Can you suggest a place where I can stay? What do people usually wear to weddings in your country? What can I buy them for a present?"
        </div>
    </div>

    <div class="writing-zone">
        <textarea id="writingBox" placeholder="Write your email here..."></textarea>
        <div id="counter" class="word-counter">Words: 0 / 40-60</div>
    </div>

    <button id="submitBtn" class="btn-submit" onclick="processSubmission()">Submit & View Feedback</button>

    <div id="feedbackArea">
        <h2 style="text-align: center;">Feedback Report</h2>
        <ul id="improveList"></ul>
        <ul id="correctList"></ul>
    </div>
</div>

<script>
    const students = {
        "7A": ["Abarca Nuñez Florencia Ayelén", "Alfaro Cuevas Agustina Paz", "Argote Luza Amanda Leonor", "Arias Alegría Gustavo León", "Barrera León Antonia Paz", "Barriga Fernández Alex Eduardo", "Castillo Herrera Javier David", "Castro Mincone Emilia Alessandra", "Celis Canales Santiago", "Cortés Cabello Clemente Nicolás", "Del Río Fernández Santiago Isaac", "Fuentes Ramírez Alejandro Ignacio", "González Arriagada Joaquín Alonso", "González Yáñez Lorenzo Tomás", "Guerrero Bustamante Vicente", "Hinojosa Carrasco Victoria Antonia", "Hiplan Godoy Rafaella Francisca", "Iglesias Guerrero Maite Agustina", "Jiménez Monsalves Laura Elena", "Méndez Fernández Violeta Millaray", "Montenegro Uribarri Agustina Paz", "Muñoz Espinoza Mariano Emilio", "Neira Orellana Nicolás Andrés", "Norambuena Garcés Matías Clemente", "Núñez Zamora Florencia Antonia", "Pérez Escobar Emilia Andrea", "Ramírez Cartagena Mateo Ignacio", "Ramírez Oliva Amaro Andrés", "Reffer Horvath Ignacio Javier", "Retamal Leiva Maximiliano Antonio", "Reyes Bravo María Vicenta", "Reyes Urrea Alicia Cristina", "Sánchez Ramírez Cristobal Guillermo", "Veizaga Ruiz Darío Alonso", "Véliz Cortés Josefina Viviana"],
        "7B": ["Álvarez de Araya Almarza Bruno Ignacio", "Araya Espinoza Bárbara Yudich", "Araya Seguel Javier Ignacio", "Arias Alegría Felipe Roberto", "Arriaza Marsh Paz Emilia", "Barbaste Escalante Emma Leonor", "Barrera Jaque Trinidad Ignacia", "Calderón Palma José Agustín", "Campusano Pérez Francisca Almudena", "Castro Jara Matías Ignacio", "Contreras Arriagada Juan Pablo", "Cortés Díaz Joaquín Alonso", "Díaz Cortés Gaspar Ignacio", "Espinoza Cornejo Fernanda Isidora", "Figueroa Cárdenas Rafaela Sofía", "Figueroa Salazar Cristóbal Javier", "Hernández Leiva Emiliana Catalina", "Lasserre Rodriguez Clara Belén", "Maira Péndola Facundo Alfonso", "Martini Sutherland Isabella Francesca Rosetta", "Moraga Martínez Fernanda Paz", "Neyra Anabalón Vicente Alonso", "Olea Leiva Elisa Magdalena", "Olivares Sánchez Pablo Ignacio", "Orellana García Cristóbal Felipe", "Oviedo Obreque Camila Antonia", "Pacheco Palma Matías Ignacio", "Palma Péndola Gonzalo Alonzo", "Pérez Madariaga Nicolás Maximiliano", "Reyes Briones Lucas Javier", "Saldivia San Martín Emilio Alberto", "Urrutia González Amanda Florencia", "Valdenegro Román Cristóbal Tomás", "Valdés Vergara Gastón Emilio", "Valverde Véliz Santiago Alonso", "Vásquez Reyes María José Valentina", "Wood Corrales Andrew Benjamín Buchanan"],
        "7C": ["Acevedo Gutiérrez Agustín Emilio", "Aliaga Pennanen José Tomás Antonio", "Arévalo Jara Carla Ignacia", "Arrieta Angulo Felipe Esteban", "Blanco Contreras María Isidora", "Burgos Salazar Agustín Tomás", "Cano Morgado Rafael Elías", "Chávez González Elisa Isabella", "Contreras Ramos Helena Paz", "Dehnhardt Berríos Tomás Leon", "Dinamarca Aránguiz Rebeca Elena", "Flores Ravera Amalia Lourdes", "Lema Carrasco María Jesús", "Loaiza Vistoso María Isabel", "Mallea Aldunate Constanza Paz", "Marrujo Pardo Gisselle Andrea", "Montenegro Vargas Kiara", "Núñez Henríquez Guadalupe Ignacia", "Núñez Zapata Olivia Paz", "Ogaz Klauser Rosario Paz", "Orellana Beltrán Felipe Andrés", "Pinto Decencier Maximiliano Alonso", "Ponce Del Canto María Laura", "Ponce Quintanilla Laura Victoria", "Quezada Ibarra Eduardo Gabriel", "Reyes Alarcón Aimee Sarahi", "Román Burgos Monserrat Catalina", "Ruz Reyes Tomás Benjamín", "Sánchez Rodríguez Facundo León", "Squella Troncoso Agustín Enrique", "Suazo Miranda Clemente León", "Ulloa Vega Emilia Ignacia", "Vega Paz Catalina Renata", "Vergara Rojas Mariana Almendra Lucía", "Vines Zúñiga Edmundo André", "Yaksic Rivera Savka Milena", "Yáñez Saavedra Francisca Isidora"]
    };

    function updateStudentList() {
        const course = document.getElementById('courseSelect').value;
        const studentSelect = document.getElementById('studentSelect');
        studentSelect.innerHTML = '<option value="">Select your name</option>';
        if (course) {
            students[course].forEach(name => {
                let opt = document.createElement('option');
                opt.value = name;
                opt.innerHTML = name;
                studentSelect.appendChild(opt);
            });
            studentSelect.disabled = false;
        } else {
            studentSelect.disabled = true;
        }
    }

    const scriptURL = "https://script.google.com/macros/s/AKfycby-0PHNKPAI-eq766H9GF8aKQ5YDi5omxdx28s94LjnOxrQH7J5x-L6cw4YJGBP9wxxOQ/exec";

    document.getElementById('writingBox').addEventListener('input', function() {
        const words = this.value.trim().split(/\s+/).filter(w => w.length > 0).length;
        const counter = document.getElementById('counter');
        counter.innerText = `Words: ${words} / 40-60`;
        counter.style.color = (words >= 40 && words <= 60) ? "var(--success)" : "var(--error)";
    });

    async function processSubmission() {
        const text = document.getElementById('writingBox').value.trim();
        const fullName = document.getElementById('studentSelect').value;
        const course = document.getElementById('courseSelect').value;
        const words = text.split(/\s+/).filter(w => w.length > 0);

        if (!fullName || !course || !text) return alert("Please select your name and write the email.");
        if (words.length < 10) return alert("Text too short.");

        const improve = []; const correct = [];
        if (words.length < 40 || words.length > 60) improve.push(`Length: ${words.length} words. Target 40-60.`);
        else correct.push("Word count correct.");

        if (/\b(stay|hotel|house)\b/i.test(text)) correct.push("Suggested a place.");
        else improve.push("Suggest where to stay.");

        if (/\b(wear|suit|dress)\b/i.test(text)) correct.push("Suggested clothes.");
        else improve.push("Suggest what to wear.");

        document.getElementById('improveList').innerHTML = improve.map(i => `<li class="improve">${i}</li>`).join('');
        document.getElementById('correctList').innerHTML = correct.map(c => `<li class="correct">${c}</li>`).join('');
        document.getElementById('feedbackArea').style.display = 'block';

        const btn = document.getElementById('submitBtn');
        btn.innerText = "Submitting..."; btn.disabled = true;

        try {
            await fetch(scriptURL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ name: fullName, course: course, text: text }),
                headers: { 'Content-Type': 'application/json' }
            });
            localStorage.setItem("assignment_completed", "true");
            alert("✅ Tarea enviada!");
            btn.innerText = "Submitted";
        } catch (e) {
            alert("Error al enviar, pero revisa tu feedback abajo.");
            btn.disabled = false; btn.innerText = "Retry";
        }
    }
</script>
</body>
</html>
